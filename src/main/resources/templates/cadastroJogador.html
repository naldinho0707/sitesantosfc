<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" th:href="@{/img/Santos-480.png}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>CADASTRO JOGADOR | SANTOS FC</title>
</head>

<body>

    <header class="header-duplo">

        <div class="header-top">
            <aside class="header-marca">
                <img th:src="@{/img/santos-header.png}" alt="Logo">
                <h1>Santos Futebol Clube 2026</h1>
            </aside>
            <aside class="header-usuario">
                <span sec:authorize="isAuthenticated()">
                    Olá, <strong sec:authentication="name"></strong>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit"
                            th:data-nome="${#authentication.name}"
                            onclick="return confirm('Deseja realmente sair da conta: ' + this.dataset.nome + '?');">
                            Sair
                        </button>
                    </form>
                </span>
                <span sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}">Login</a>
                </span>
            </aside>
        </div>
        <nav class="header-nav">
            <ul>
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/listagemTitulo}">Títulos</a></li>
                <li><a th:href="@{/elenco}">Elenco</a></li>
                <li><a th:href="@{/escudos}">Escudos</a></li>
                <li><a th:href="@{/jogador}">Jogador</a></li>
                <li><a th:href="@{/campeonato}">Campeonato</a></li>
                <li><a th:href="@{/inscritos}">Inscritos</a></li>
                <li sec:authorize="hasAuthority('admin')">
                    <a th:href="@{/listagemUsuario}">Usuários</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="cadastrarTitulo cadastrarUsuario">
        <div>
            <a th:href="@{/jogador}">Voltar</a>
            <h2>Cadastrar Jogador</h2>
        </div>

        <!-- ✅ Correto — um único section, erro dentro do mesmo form -->
        <section>
            <div th:if="${erro}" style="color:red; text-align:center; padding:10px;">
                ⚠️ <span th:text="${erro}"></span>
            </div>

            <form th:action="@{/jogador/cadastrar}" method="post"
                th:object="${jogador}" autocomplete="off">

                <label>Matrícula</label>
                <input type="text" th:field="*{matricula}"
                    placeholder="Ex: 00001" maxlength="5" required>

                <label>Nome</label>
                <input type="text" th:field="*{nome}"
                    placeholder="Nome completo do jogador" required>

                <label>Idade</label>
                <input type="number" th:field="*{idade}"
                    placeholder="Idade" min="15" max="50" required>

                <button type="submit">Cadastrar Jogador</button>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy; Criado por: Reginaldo Luiz Formoso Junior | FATEC-RL. 2026</p>
    </footer>
</body>
</html>
