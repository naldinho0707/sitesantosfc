<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" th:href="@{img/Santos-480.png}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{css/style.css}">
    <title>CADASTRO USUÁRIO | SANTOS FC</title>
</head>

<body>

    <header class="header-duplo">

        <!-- Linha 1: Logo + Título + Login/Usuário -->
        <div class="header-top">
            <aside class="header-marca">
                <img th:src="@{img/santos-header.png}" alt="Logo do Santos Futebol Clube">
                <h1>Santos Futebol Clube 2026</h1>
            </aside>

            <aside class="header-usuario">
                <!-- Se estiver logado -->
                <span sec:authorize="isAuthenticated()">
                    Olá, <strong sec:authentication="name"></strong>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit"
                            onclick="return confirm('Deseja realmente sair da sua conta?');">
                            Sair
                        </button>
                    </form>
                </span>
                <!-- Se NÃO estiver logado -->
                <span sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}">Login</a>
                </span>
            </aside>
        </div>

        <!-- Linha 2: Navegação -->
        <nav class="header-nav">
            <ul>
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/listagemTitulo}">Títulos</a></li>
                <li><a th:href="@{/elenco}">Elenco</a></li>
                <li><a th:href="@{/escudos}">Escudos</a></li>
                <li><a th:href="@{/jogador}">Jogador</a></li>
                <li><a th:href="@{/campeonato}">Campeonato</a></li>
                <li><a th:href="@{/inscritos}">Inscritos</a></li>
                <!-- Só aparece para o admin -->
                <li sec:authorize="hasAuthority('admin')"><a th:href="@{/listagemUsuario}">Usuários</a></li>
            </ul>
        </nav>

    </header>

    <main class="cadastrarTitulo cadastrarUsuario">

        <div>
            <h2>Cadastre-se no Santos FC!</h2>
            <a th:href="@{/login}">Voltar</a>
        </div>

        <section>
            <form th:action="@{/cadastroUsuario}" method="post" th:object="${usuario}">

                <label for="nome">Nome completo</label>
                <input type="text" th:field="*{nome}" placeholder="Digite seu nome completo" required>

                <label for="email">Email</label>
                <input type="email" th:field="*{email}" placeholder="Digite seu email" autocomplete="off" required>

                <label for="password">Senha</label>
                <input type="password" th:field="*{password}" placeholder="Digite sua senha" autocomplete="off" required>

                <button type="submit">Cadastrar</button>

            </form>
        </section>

    </main>

    <footer>
        <p>© Criado por: Reginaldo Luiz Formoso Junior | Aluno de Sistemas para Internet - FATEC-RL. 2026</p>
    </footer>

</body>
</html>
